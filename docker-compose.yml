services:
  ml:
    build:
      context: .
      dockerfile: Dockerfile.ml
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      - ML_HOST=ml
      - PORT=3001
    depends_on:
      - ml
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
